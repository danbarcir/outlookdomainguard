<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>OutlookDomainGuard Commands</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>
  <script type="text/javascript">

    var USE_VERSION = "B";
    var INTERNAL_DOMAINS = ["cirtech-electronics.com"];

    Office.initialize = function(reason) {
      console.log("[DomainGuard] Office.initialize called");
    };

    Office.onReady(function(info) {
      console.log("[DomainGuard] Office.onReady called");
    });

    function onItemSend(event) {
      console.log("[DomainGuard] onItemSend triggered!");
      try {
        var item = Office.context.mailbox.item;
        if (!item) {
          event.completed({ allowEvent: true });
          return;
        }
        collectAllRecipients(item, function(allAddresses) {
          try {
            var domains = extractDomains(allAddresses);
            console.log("[DomainGuard] Domains: " + domains.join(", "));
            if (USE_VERSION === "B") {
              handleVersionB(domains, event);
            } else {
              handleVersionA(domains, event);
            }
          } catch (err) {
            event.completed({ allowEvent: true });
          }
        });
      } catch (err) {
        event.completed({ allowEvent: true });
      }
    }

    window.onItemSend = onItemSend;

    function handleVersionA(domains, event) {
      var unique = getUniqueDomains(domains);
      if (unique.length <= 1) { event.completed({ allowEvent: true }); return; }
      showWarning("Warning: Multiple recipient domains detected\n\nDomains found:\n  " + unique.sort().join("\n  ") + "\n\nDismiss this message and click Send again to proceed.", event);
    }

    function handleVersionB(domains, event) {
      var unique = getUniqueDomains(domains);
      var internalSet = INTERNAL_DOMAINS.map(function(d) { return d.toLowerCase(); });
      var external = unique.filter(function(d) { return internalSet.indexOf(d) === -1; });
      var hasInternal = unique.some(function(d) { return internalSet.indexOf(d) !== -1; });
      var warn = (hasInternal && external.length > 0) || external.length > 1;
      if (!warn) { event.completed({ allowEvent: true }); return; }
      var msg = hasInternal
        ? "Warning: External recipient detected\n\nExternal domain(s):\n  " + external.sort().join("\n  ") + "\n\nInternal recipients (cirtech-electronics.com) are also included.\n\nDismiss and click Send again to proceed."
        : "Warning: Multiple external domains\n\n  " + external.sort().join("\n  ") + "\n\nDismiss and click Send again to proceed.";
      showWarning(msg, event);
    }

    function showWarning(message, event) {
      Office.context.mailbox.item.notificationMessages.replaceAsync("domainWarning",
        { type: Office.MailboxEnums.ItemNotificationMessageType.ErrorMessage, message: message },
        function(result) { event.completed({ allowEvent: false }); }
      );
    }

    function collectAllRecipients(item, callback) {
      var all = []; var pending = 3;
      function done(a) { all = all.concat(a); pending--; if (pending === 0) callback(all); }
      function get(field, cb) {
        try { field.getAsync(function(r) { cb(r.status === Office.AsyncResultStatus.Succeeded ? (r.value||[]).map(function(x){return x.emailAddress||"";}).filter(Boolean) : []); }); }
        catch(e) { cb([]); }
      }
      get(item.to, function(a){done(a);}); get(item.cc, function(a){done(a);}); get(item.bcc, function(a){done(a);});
    }

    function extractDomains(addresses) {
      var d = [];
      addresses.forEach(function(a) { if(a&&a.indexOf("@")!==-1){var p=a.split("@").pop().trim().toLowerCase();if(p)d.push(p);} });
      return d;
    }

    function getUniqueDomains(domains) {
      var seen = {};
      return domains.filter(function(d) { if(seen[d])return false; seen[d]=true; return true; });
    }

  </script>
</head>
<body></body>
</html>
