<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OutlookDomainGuard</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #f59e0b;
      --accent2:   #3b82f6;
      --safe:      #10b981;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --radius:    10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      padding: 16px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .shield {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #f59e0b22, #f59e0b44);
      border: 1px solid #f59e0b55;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-text h1 {
      font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    }
    .header-text p {
      font-size: 11px; color: var(--muted);
    }

    /* ── Status card ── */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 14px;
    }
    .status-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.active { background: var(--safe); box-shadow: 0 0 6px var(--safe); }
    .dot.loading { background: var(--muted); }
    .status-label { font-size: 12px; font-weight: 500; }
    .version-badge {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: #f59e0b22;
      color: var(--accent);
      border: 1px solid #f59e0b44;
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* ── Domain list ── */
    .domains-section { margin-bottom: 14px; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .domain-list {
      display: flex; flex-direction: column; gap: 5px;
    }
    .domain-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }
    .domain-pill .tag {
      font-size: 9px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 5px;
      border-radius: 3px;
      margin-left: auto;
    }
    .tag.internal { background: #10b98122; color: var(--safe); border: 1px solid #10b98144; }
    .tag.external { background: #f59e0b22; color: var(--warn); border: 1px solid #f59e0b44; }
    .tag.unknown  { background: #6b728022; color: var(--muted); border: 1px solid #6b728044; }

    /* ── Verdict banner ── */
    .verdict {
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 14px;
      font-size: 12px;
      line-height: 1.5;
    }
    .verdict.safe    { background: #10b98112; border: 1px solid #10b98133; }
    .verdict.warning { background: #f59e0b12; border: 1px solid #f59e0b33; }
    .verdict.clear   { background: var(--surface); border: 1px solid var(--border); }
    .verdict-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .verdict-text strong { display: block; margin-bottom: 2px; font-size: 12px; }
    .verdict-text span   { color: var(--muted); font-size: 11px; }

    /* ── Config section ── */
    .config-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .config-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted);
    }
    .config-val {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--accent);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      padding: 12px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="shield">🛡</div>
    <div class="header-text">
      <h1>OutlookDomainGuard</h1>
      <p>Recipient domain checker</p>
    </div>
  </div>

  <div class="status-card">
    <div class="status-row">
      <div class="dot loading" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Initialising…</span>
      <span class="version-badge" id="versionBadge">—</span>
    </div>
  </div>

  <div class="domains-section">
    <div class="section-label">Recipients detected</div>
    <div class="domain-list" id="domainList">
      <div class="empty">Open a compose window to see recipient domains</div>
    </div>
  </div>

  <div class="verdict clear" id="verdictBox">
    <div class="verdict-icon">📭</div>
    <div class="verdict-text">
      <strong>No message open</strong>
      <span>Compose an email to see domain analysis</span>
    </div>
  </div>

  <div class="config-card">
    <div class="config-row">
      <span>Mode</span>
      <span class="config-val" id="configMode">—</span>
    </div>
    <div class="config-row" style="margin-top:5px">
      <span>Internal domain(s)</span>
      <span class="config-val" id="configDomains">—</span>
    </div>
  </div>

  <script>
    var USE_VERSION = "B";
    var INTERNAL_DOMAINS = ["cirtech-electronics.com"];

    Office.onReady(function() {
      var versionLabel = USE_VERSION === "B" ? "Version B" : "Version A";
      document.getElementById("versionBadge").textContent = versionLabel;
      document.getElementById("configMode").textContent =
        USE_VERSION === "B" ? "Internal grouping" : "Generic (any domain)";
      document.getElementById("configDomains").textContent =
        USE_VERSION === "B" ? INTERNAL_DOMAINS.join(", ") : "n/a";

      var item = Office.context.mailbox.item;
      if (!item) {
        setStatus(false, "No message open");
        return;
      }

      setStatus(true, "Active — monitoring recipients");
      loadDomains(item);
    });

    function setStatus(active, text) {
      var dot = document.getElementById("statusDot");
      dot.className = "dot " + (active ? "active" : "loading");
      document.getElementById("statusLabel").textContent = text;
    }

    function loadDomains(item) {
      var allAddresses = [];
      var pending = 3;

      function done(addresses) {
        allAddresses = allAddresses.concat(addresses);
        pending--;
        if (pending === 0) renderDomains(allAddresses);
      }

      function get(field, cb) {
        field.getAsync(function(r) {
          if (r.status === Office.AsyncResultStatus.Succeeded) {
            cb((r.value || []).map(function(x) { return x.emailAddress || ""; }).filter(Boolean));
          } else { cb([]); }
        });
      }

      get(item.to,  function(a) { done(a); });
      get(item.cc,  function(a) { done(a); });
      get(item.bcc, function(a) { done(a); });
    }

    function renderDomains(addresses) {
      var domainMap = {};
      addresses.forEach(function(addr) {
        if (addr.indexOf("@") !== -1) {
          var d = addr.split("@").pop().trim().toLowerCase();
          if (d) domainMap[d] = true;
        }
      });

      var domains = Object.keys(domainMap).sort();
      var list = document.getElementById("domainList");

      if (domains.length === 0) {
        list.innerHTML = '<div class="empty">No recipients yet</div>';
        setVerdict("clear", "📭", "No recipients", "Add recipients to see domain analysis");
        return;
      }

      var internalSet = INTERNAL_DOMAINS.map(function(d) { return d.toLowerCase(); });

      list.innerHTML = domains.map(function(d) {
        var isInternal = internalSet.indexOf(d) !== -1;
        var tagClass = USE_VERSION === "B" ? (isInternal ? "internal" : "external") : "unknown";
        var tagLabel = USE_VERSION === "B" ? (isInternal ? "internal" : "external") : "";
        var tagHtml = tagLabel ? '<span class="tag ' + tagClass + '">' + tagLabel + '</span>' : '';
        return '<div class="domain-pill">📧 ' + d + tagHtml + '</div>';
      }).join("");

      // Compute verdict
      var externalDomains = domains.filter(function(d) {
        return internalSet.indexOf(d) === -1;
      });
      var hasInternal = domains.some(function(d) { return internalSet.indexOf(d) !== -1; });

      var warn;
      if (USE_VERSION === "B") {
        warn = (hasInternal && externalDomains.length > 0) || externalDomains.length > 1;
      } else {
        warn = domains.length > 1;
      }

      if (warn) {
        setVerdict("warning", "⚠️", "Warning — domain conflict detected",
          "Sending will trigger a warning popup");
      } else {
        setVerdict("safe", "✅", "Safe to send",
          "All recipients share a common domain group");
      }
    }

    function setVerdict(cls, icon, title, sub) {
      var box = document.getElementById("verdictBox");
      box.className = "verdict " + cls;
      box.innerHTML =
        '<div class="verdict-icon">' + icon + '</div>' +
        '<div class="verdict-text"><strong>' + title + '</strong><span>' + sub + '</span></div>';
    }
  </script>
</body>
</html>
